version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/calendar
      - JWT_SECRET=your_jwt_secret_here_12345
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: